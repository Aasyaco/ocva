name: Robust Android LLVM Toolchain Builder

on:
  workflow_dispatch:
    inputs:
      enable_lto:
        description: 'Enable LTO (Link Time Optimization)'
        required: true
        type: boolean
        default: false
      enable_pgo:
        description: 'Enable PGO (Profile Guided Optimization)'
        required: true
        type: boolean
        default: false
      enable_bolt:
        description: 'Enable BOLT binary optimizations'
        required: true
        type: boolean
        default: false
      build_windows:
        description: 'Cross-compile Windows toolchain binaries'
        required: true
        type: boolean
        default: false
      skip_tests:
        description: 'Skip LLVM/Clang regression tests'
        required: true
        type: boolean
        default: true
      jobs:
        description: 'Thread count override (0 for auto/max CPU cores)'
        required: true
        type: string
        default: '0'

env:
  WORKDIR: ${{ github.workspace }}/llvm-toolchain
  PYTHONUNBUFFERED: "1"

jobs:
  build-toolchain:
    name: Build LLVM
    # Large or self-hosted runners are highly recommended to prevent disk exhaustion
    runs-on: ubuntu-22.04

    steps:
      - name: Optimize Runner Disk Layout
        uses: easimon/maximize-build-space@v8
        with:
          root-reserve-mb: 4096
          swap-size-mb: 12288 # Generous swap allocation to prevent OOM errors during LTO linking
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Tune VM System Memory & I/O
        run: |
          # Fine-tune Linux virtual memory settings for sustained compile I/O throughput
          sudo sysctl vm.dirty_background_ratio=5
          sudo sysctl vm.dirty_ratio=10
          sudo sysctl vm.swappiness=15
          
          echo "=== DISK SPACE STATUS ==="
          df -h

      - name: Install System Toolchain & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 \
            python-is-python3 ninja-build cmake libssl-dev libelf-dev libgmp-dev \
            libmpfr-dev libmpc-dev
          
          # Install stable 'repo' tool
          mkdir -p "$HOME/bin"
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > "$HOME/bin/repo"
          chmod a+x "$HOME/bin/repo"
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure Git Workspace Identity
        run: |
          git config --global user.email "android-llvm-builder@github.local"
          git config --global user.name "Android Toolchain Builder"
          git config --global color.ui false

      - name: Initialize Repo Workspace & Overlay Branches
        run: |
          mkdir -p "${{ env.WORKDIR }}"
          cd "${{ env.WORKDIR }}"
          
          echo "::group::Initialize Android Toolchain Manifest"
          repo init -u https://android.googlesource.com/platform/manifest -b llvm-toolchain --depth=1
          echo "::endgroup::"
          
          echo "::group::Inject Custom Local Manifest Overrides"
          mkdir -p .repo/local_manifests
          cat <<EOF > .repo/local_manifests/override.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <!-- Target the specific stable mirror branch requested -->
            <remove-project name="toolchain/llvm_android" />
            <project path="toolchain/llvm_android" name="toolchain/llvm_android" 
                     revision="refs/heads/mirror-goog-llvm-r596125-release" />
            
            <!-- Force pull the experimental/unreleased upstream main branch -->
            <remove-project name="toolchain/llvm-project" />
            <project path="toolchain/llvm-project" name="toolchain/llvm-project" 
                     revision="refs/heads/main" />
          </manifest>
          EOF
          echo "::endgroup::"

      - name: Resilient Workspace Sync
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "::group::Synchronize Repositories (with retries)"
          # Google servers can occasionally drop connections under high runner concurrency.
          SYNC_SUCCESS=false
          for i in {1..5}; do
            echo "Sync attempt $i of 5..."
            if repo sync -c -j$(nproc) --no-tags --no-clone-bundle --optimized-fetch --prune; then
              SYNC_SUCCESS=true
              break
            fi
            echo "Attempt $i failed. Retrying in 20 seconds..."
            sleep 20
          done
          
          if [ "$SYNC_SUCCESS" = false ]; then
            echo "Error: Failed to sync toolchain components after 5 attempts."
            exit 1
          fi
          echo "::endgroup::"

      - name: Execute LLVM Compiler Build Script
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "::group::Compilation Pipeline"
          
          # Dynamically map the action inputs into argument flags
          BUILD_FLAGS=""
          
          if [ "${{ github.event.inputs.build_windows }}" = "false" ]; then
            BUILD_FLAGS="$BUILD_FLAGS --no-build windows"
          fi
          
          if [ "${{ github.event.inputs.skip_tests }}" = "true" ]; then
            BUILD_FLAGS="$BUILD_FLAGS --skip-tests"
          fi
          
          if [ "${{ github.event.inputs.enable_lto }}" = "true" ]; then
            BUILD_FLAGS="$BUILD_FLAGS --lto"
          else
            BUILD_FLAGS="$BUILD_FLAGS --no-lto"
          fi

          if [ "${{ github.event.inputs.enable_pgo }}" = "true" ]; then
            BUILD_FLAGS="$BUILD_FLAGS --pgo"
          fi

          if [ "${{ github.event.inputs.enable_bolt }}" = "true" ]; then
            BUILD_FLAGS="$BUILD_FLAGS --bolt"
          fi
          
          # Parallel build configurations
          JOBS="${{ github.event.inputs.jobs }}"
          if [ "$JOBS" != "0" ] && [ -n "$JOBS" ]; then
             export FORCE_MAKE_JOBS="$JOBS"
          fi

          echo "Command execution: python3 toolchain/llvm_android/build.py $BUILD_FLAGS"
          python3 toolchain/llvm_android/build.py $BUILD_FLAGS
          
          echo "::endgroup::"

      - name: Compress Target Binaries
        if: success()
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "::group::Packaging Installation Assets"
          INSTALL_DIR="out/install/linux-x86/clang-dev"
          
          if [ -d "$INSTALL_DIR" ]; then
            tar -czf "$GITHUB_WORKSPACE/clang-android-r596125-custom.tar.gz" -C "$INSTALL_DIR" .
            echo "Package compressed successfully."
          else
            echo "Error: Installation directory does not exist at $INSTALL_DIR"
            exit 1
          fi
          echo "::endgroup::"

      - name: Upload Compiled Toolchain
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-clang-r596125-custom
          path: clang-android-r596125-custom.tar.gz
          retention-days: 14

      - name: Collect Compilation Diagnostics (On Failure)
        if: failure()
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "::group::Diagnostic Harvesting"
          mkdir -p "$GITHUB_WORKSPACE/diagnostics"
          
          # Copy compiler stdout/stderr outputs and configuration files
          find out/ -name "*.log" -exec cp --parents {} "$GITHUB_WORKSPACE/diagnostics" \; 2>/dev/null || true
          find out/ -name "CMakeCache.txt" -exec cp --parents {} "$GITHUB_WORKSPACE/diagnostics" \; 2>/dev/null || true
          
          # Compress logs
          cd "$GITHUB_WORKSPACE"
          tar -czf diagnostics.tar.gz diagnostics/
          echo "::endgroup::"

      - name: Upload Failure Diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-diagnostics
          path: diagnostics.tar.gz
          retention-days: 7
