name: Build Android LLVM Toolchain

on:
  workflow_dispatch: # Allows manual triggering

jobs:
  build-llvm:
    # Use a large runner if available. Standard ubuntu-latest is risky for LLVM.
    runs-on: ubuntu-latest 
    
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 \
            python-is-python3 ninja-build cmake libssl-dev
          
          # Install 'repo' tool
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure Git
        run: |
          git config --global user.email "build-bot@example.com"
          git config --global user.name "Android Build Bot"
          git config --global color.ui false

      - name: Initialize Repo and Apply Overrides
        run: |
          mkdir llvm-toolchain && cd llvm-toolchain
          # Initialize with the standard toolchain manifest
          repo init -u https://android.googlesource.com/platform/manifest -b llvm-toolchain --depth=1
          
          # Create local manifest to force the specific branches requested
          mkdir -p .repo/local_manifests
          cat <<EOF > .repo/local_manifests/override.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <remove-project name="toolchain/llvm_android" />
            <project path="toolchain/llvm_android" name="toolchain/llvm_android" 
                     revision="refs/heads/mirror-goog-llvm-r596125-release" />
            
            <remove-project name="toolchain/llvm-project" />
            <project path="toolchain/llvm-project" name="toolchain/llvm-project" 
                     revision="refs/heads/main" />
          </manifest>
          EOF

      - name: Sync Source Code
        working-directory: llvm-toolchain
        run: |
          # Syncing only necessary projects to save space
          # Use -c (current branch) and -j for parallel sync
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle

      - name: Build Toolchain
        working-directory: llvm-toolchain
        run: |
          # build.py options explained:
          # --no-build windows: Skips Windows cross-compilation (saves massive time/space)
          # --skip-tests: Skips the long LLVM test suite
          # --no-lto: Reduces memory usage during the final link (essential for 7GB/16GB runners)
          # --no-mlgo: Skips ML-based optimizations (requires specialized setup)
          
          python3 toolchain/llvm_android/build.py \
            --no-build windows \
            --skip-tests \
            --no-lto \
            --no-mlgo

      - name: Package and Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-llvm-r596125-custom
          path: |
            llvm-toolchain/out/install/linux-x86/clang-dev
            # Optional: collect the build logs if it fails
          retention-days: 7
