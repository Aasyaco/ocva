name: Upload Android NDK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: ndk-r27d
            url: https://dl.google.com/android/repository/android-ndk-r27d-linux.zip

          - branch: ndk-r29
            url: https://dl.google.com/android/repository/android-ndk-r29-linux.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip git git-lfs

      - name: Download NDK
        run: |
          wget -q -O ndk.zip "${{ matrix.url }}"
          unzip -q ndk.zip
          rm -f ndk.zip

      - name: Initialize Repository
        run: |
          mkdir repo
          shopt -s dotglob
          mv android-ndk-* repo/

      - name: Configure Git & LFS
        run: |
          cd repo

          git init
          git checkout -b "${{ matrix.branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git lfs install

          # Track all NDK files through LFS
          git lfs track "**"

          git add .gitattributes
          git add .

          git commit -m "Upload ${{ matrix.branch }}"

      - name: Push Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd repo

          git remote add origin \
            https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          git push -f origin "${{ matrix.branch }}"
